# Railway Configuration
# Uses root Dockerfile which references backend folder

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"  # Use root Dockerfile that copies from backend/

[deploy]
startCommand = "python -m uvicorn app.main:app --host 0.0.0.0 --port 8000"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
